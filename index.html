<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wheel of Fortune — Watch</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .qr-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      width: 100%;
      max-width: 420px;
    }

    .qr-section p {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .qr-section img {
      width: 160px;
      height: 160px;
      border-radius: 12px;
      border: 2px solid var(--border);
      object-fit: contain;
      background: #fff;
      padding: 8px;
    }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>

  <div class="page">
    <header>
      <h1>Wheel of Fortune</h1>
      <p class="subtitle">Live Viewing</p>
      <span class="badge viewer">👁 Viewer</span>
    </header>

    <div class="wheel-stage">
      <div class="pointer"></div>
      <canvas id="wheel"></canvas>
      <div class="hub"></div>
    </div>

    <div class="controls">
      <div id="status"></div>
    </div>

    <!-- QR Code — place qrcode.jpg in the root of your project -->
    <div class="qr-section">
      <p>Scan to join</p>
      <img src="/qrcode.jpg" alt="QR Code" />
    </div>
  </div>

  <div id="result-banner">
    <div class="result-label">🎯 Result</div>
    <div class="result-value" id="result-value">—</div>
    <div class="dismiss">Closes automatically</div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>window.IS_ADMIN = false;</script>
  <script src="/script.js"></script>
</body>
</html>
